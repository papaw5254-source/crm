name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Backend ─────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── Setup SSH ─────────────────────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Pull latest source on server
        run: ssh root@${{ secrets.SERVER_HOST }} "cd /root/crm && git fetch origin && git reset --hard origin/main"

      - name: Copy backend dist to server
        run: rsync -az --delete backend/dist/ root@${{ secrets.SERVER_HOST }}:/root/crm/backend/dist/

      - name: Install new backend packages (if any)
        run: ssh root@${{ secrets.SERVER_HOST }} "cd /root/crm/backend && npm install --production --prefer-offline 2>&1 | tail -3"

      - name: Restart services
        run: ssh root@${{ secrets.SERVER_HOST }} "pm2 delete backend 2>/dev/null || true; pm2 start /root/crm/backend/dist/main.js --name backend --cwd /root/crm/backend; pm2 save"

      - name: Install nginx if missing
        run: ssh root@${{ secrets.SERVER_HOST }} "which nginx || (apt-get update -y && apt-get install -y nginx)"

      - name: Deploy nginx config
        run: ssh root@${{ secrets.SERVER_HOST }} "ln -sf /root/crm/nginx/crm.conf /etc/nginx/sites-available/crm && ln -sf /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/crm && rm -f /etc/nginx/sites-enabled/default"

      - name: Open firewall port 80
        run: ssh root@${{ secrets.SERVER_HOST }} "ufw allow 80/tcp && ufw allow 'Nginx HTTP' || true"

      - name: Start/reload nginx
        run: ssh root@${{ secrets.SERVER_HOST }} "nginx -t && systemctl enable nginx && systemctl restart nginx"

      - name: Check status
        run: ssh root@${{ secrets.SERVER_HOST }} "pm2 list && systemctl is-active nginx && echo 'Nginx port:' && ss -tlnp | grep ':80'"

      - name: Show backend logs
        run: ssh root@${{ secrets.SERVER_HOST }} "pm2 logs backend --lines 60 --nostream"
