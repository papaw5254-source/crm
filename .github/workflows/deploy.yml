name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Backend ─────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── Build Frontend ────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: 1

      # ── Setup SSH ─────────────────────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Pull latest source on server
        run: ssh root@${{ secrets.SERVER_HOST }} "cd /root/crm && git pull"

      - name: Copy backend dist to server
        run: rsync -az --delete backend/dist/ root@${{ secrets.SERVER_HOST }}:/root/crm/backend/dist/

      - name: Copy frontend build to server
        run: rsync -az --delete frontend/.next/ root@${{ secrets.SERVER_HOST }}:/root/crm/frontend/.next/

      - name: Install new backend packages (if any)
        run: ssh root@${{ secrets.SERVER_HOST }} "cd /root/crm/backend && npm install --production --prefer-offline 2>&1 | tail -3"

      - name: Restart services
        run: ssh root@${{ secrets.SERVER_HOST }} "pm2 restart backend && pm2 restart frontend && pm2 save"

      - name: Check status
        run: ssh root@${{ secrets.SERVER_HOST }} "pm2 list"
